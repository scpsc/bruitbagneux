<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>D'où vient le bruit ?</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>

html,
body {
  margin: 0;
  height: 100%;
  font-family: Arial, sans-serif;
}

#map {
  width: 100%;
  height: 100%;
}

/* =========================
   PANNEAU PARAMÈTRES
   ========================= */

.controls {

  position: absolute;

  top: 10px;
  right: 10px;

  z-index: 1000;

  width: 320px;
  max-width: calc(100vw - 20px);

  background: white;

  border-radius: 12px;

  box-shadow: 0 4px 15px rgba(0,0,0,0.25);

  overflow: hidden;
}

.controls-header {

  display: flex;

  justify-content: space-between;
  align-items: center;

  padding: 12px;

  background: #f5f5f5;

  border-bottom: 1px solid #ddd;

  font-weight: bold;
}

.controls-content {
  padding: 14px;
}

.controls.collapsed .controls-content {
  display: none;
}

.toggle-btn {

  width: auto;

  margin: 0;
  padding: 0;

  border: none;
  background: none;

  font-size: 24px;

  cursor: pointer;
}

.controls label {
  display: block;
  margin-top: 12px;
  font-size: 14px;
}

.controls input[type="text"] {

  width: 100%;
  box-sizing: border-box;

  padding: 8px;
  margin-bottom: 8px;
}

.controls input[type="range"] {
  width: 100%;
}

button {

  width: 100%;
  padding: 8px;

  margin-top: 8px;

  cursor: pointer;
}

.url-box {

  margin-top: 12px;

  background: #f2f2f2;

  padding: 8px;

  border-radius: 6px;

  font-size: 12px;

  word-break: break-word;
}

@media (max-width: 768px) {

  .controls {

    width: 260px;

    top: 8px;
    right: 8px;
  }

  .controls.collapsed {
    width: auto;
  }

  .controls-content {

    max-height: 70vh;
    overflow-y: auto;
  }
}

</style>
</head>

<body>

<div class="controls" id="controls">

  <div class="controls-header">

    <span>⚙️ Paramètres</span>

    <button
      id="togglePanel"
      class="toggle-btn"
      type="button">
      −
    </button>

  </div>

  <div class="controls-content">

    <input
      type="text"
      id="addressInput"
      placeholder="Entrer une adresse"
    >

    <button id="searchBtn">
      Rechercher une adresse
    </button>

    <hr>

    <strong>Paramètres du cône</strong>

    <label>
      Orientation :
      <span id="angleValue">90</span>°

      <input
        type="range"
        id="angle"
        min="0"
        max="360"
        step="1"
        value="90"
      >
    </label>

    <label>
      Largeur :
      <span id="widthValue">40</span>°

      <input
        type="range"
        id="width"
        min="5"
        max="120"
        step="1"
        value="40"
      >
    </label>

    <label>
      Profondeur :
      <span id="depthValue">200</span> m

      <input
        type="range"
        id="depth"
        min="10"
        max="600"
        step="10"
        value="200"
      >
    </label>

    <button id="copyBtn">
      Copier l'URL
    </button>

    <div class="url-box" id="urlBox"></div>

  </div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const DEFAULT_LAT = 48.801900;
const DEFAULT_LNG = 2.321874;
const DEFAULT_ZOOM = 17;

const params = new URLSearchParams(window.location.search);

let lat = parseFloat(params.get("lat")) || DEFAULT_LAT;
let lng = parseFloat(params.get("lng")) || DEFAULT_LNG;
let angle = parseFloat(params.get("angle")) || 90;
let width = parseFloat(params.get("width")) || 40;
let depth = parseFloat(params.get("depth")) || 200;

const map = L.map("map").setView(
  [lat, lng],
  DEFAULT_ZOOM
);

L.tileLayer(
  "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
  {
    attribution: "&copy; OpenStreetMap contributors"
  }
).addTo(map);

const marker = L.marker(
  [lat, lng],
  {
    draggable: true
  }
).addTo(map);

function destinationPoint(
  lat,
  lng,
  distance,
  bearing
) {

  const R = 6378137;

  const brng = bearing * Math.PI / 180;

  const lat1 = lat * Math.PI / 180;
  const lon1 = lng * Math.PI / 180;

  const lat2 = Math.asin(
    Math.sin(lat1) * Math.cos(distance / R) +
    Math.cos(lat1) *
    Math.sin(distance / R) *
    Math.cos(brng)
  );

  const lon2 = lon1 + Math.atan2(
    Math.sin(brng) *
    Math.sin(distance / R) *
    Math.cos(lat1),

    Math.cos(distance / R) -
    Math.sin(lat1) *
    Math.sin(lat2)
  );

  return [
    lat2 * 180 / Math.PI,
    lon2 * 180 / Math.PI
  ];
}

function buildConePolygon(
  lat,
  lng,
  angle,
  width,
  depth
) {

  const points = [];

  points.push([lat, lng]);

  const start = angle - width / 2;
  const end = angle + width / 2;

  for (let a = start; a <= end; a += 2) {

    points.push(
      destinationPoint(
        lat,
        lng,
        depth,
        a
      )
    );
  }

  points.push([lat, lng]);

  return points;
}

let coneLayer = null;

function redrawCone() {

  if (coneLayer) {
    map.removeLayer(coneLayer);
  }

  coneLayer = L.polygon(
    buildConePolygon(
      lat,
      lng,
      angle,
      width,
      depth
    ),
    {
      color: "red",
      fillColor: "red",
      fillOpacity: 0.3
    }
  ).addTo(map);

  updateURL();
}

function updateURL() {

  const url =
    window.location.origin +
    window.location.pathname +
    `?lat=${lat.toFixed(6)}` +
    `&lng=${lng.toFixed(6)}` +
    `&angle=${angle}` +
    `&width=${width}` +
    `&depth=${depth}`;

  history.replaceState({}, "", url);

  document.getElementById("urlBox").textContent = url;
}

async function searchAddress() {

  const query =
    document
      .getElementById("addressInput")
      .value
      .trim();

  if (!query) return;

  const url =
    "https://nominatim.openstreetmap.org/search?" +
    new URLSearchParams({
      q: query,
      format: "json",
      limit: 1
    });

  try {

    const response = await fetch(url, {
      headers: {
        "Accept-Language": "fr"
      }
    });

    const results = await response.json();

    if (!results.length) {
      alert("Adresse introuvable");
      return;
    }

    lat = parseFloat(results[0].lat);
    lng = parseFloat(results[0].lon);

    marker.setLatLng([lat, lng]);

    map.setView([lat, lng], 17);

    redrawCone();

  } catch (err) {

    console.error(err);

    alert("Erreur de recherche");
  }
}

marker.on("drag", (e) => {

  const pos = e.target.getLatLng();

  lat = pos.lat;
  lng = pos.lng;

  redrawCone();
});

document
  .getElementById("angle")
  .addEventListener("input", (e) => {

    angle = parseFloat(e.target.value);

    document.getElementById(
      "angleValue"
    ).textContent = angle;

    redrawCone();
  });

document
  .getElementById("width")
  .addEventListener("input", (e) => {

    width = parseFloat(e.target.value);

    document.getElementById(
      "widthValue"
    ).textContent = width;

    redrawCone();
  });

document
  .getElementById("depth")
  .addEventListener("input", (e) => {

    depth = parseFloat(e.target.value);

    document.getElementById(
      "depthValue"
    ).textContent = depth;

    redrawCone();
  });

document
  .getElementById("searchBtn")
  .addEventListener("click", searchAddress);

document
  .getElementById("addressInput")
  .addEventListener("keydown", (e) => {

    if (e.key === "Enter") {
      searchAddress();
    }
  });

document
  .getElementById("copyBtn")
  .addEventListener("click", async () => {

    const url =
      document
        .getElementById("urlBox")
        .textContent;

    await navigator.clipboard.writeText(url);

    alert("URL copiée");
  });

const controls =
  document.getElementById("controls");

const togglePanel =
  document.getElementById("togglePanel");

function updatePanelIcon() {

  togglePanel.textContent =
    controls.classList.contains("collapsed")
      ? "⚙️"
      : "−";
}

togglePanel.addEventListener(
  "click",
  () => {

    controls.classList.toggle(
      "collapsed"
    );

    updatePanelIcon();
  }
);

if (window.innerWidth <= 768) {
  controls.classList.add("collapsed");
}

updatePanelIcon();

document.getElementById("angle").value = angle;
document.getElementById("width").value = width;
document.getElementById("depth").value = depth;

document.getElementById(
  "angleValue"
).textContent = angle;

document.getElementById(
  "widthValue"
).textContent = width;

document.getElementById(
  "depthValue"
).textContent = depth;

redrawCone();

</script>

</body>
</html>
